<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>발주 상세</title>
    <!-- Bootstrap CSS & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
</head>

<body class="bg-light">
    <div class="container py-5">
        <h2 class="mb-4 d-flex align-items-center">
            <img src="/orders/assets/logo.svg" alt="Logo" class="me-3" style="height:2rem; width:auto;">
            발주 상세
        </h2>

        <!-- 개별 필드 카드 -->
        <div class="row g-3 mb-4">
            <!-- 주문번호 -->
            <div class="col-sm-6 col-md-3">
                <div class="card h-100">
                    <div class="card-body text-center">
                        <h6 class="text-muted">주문번호</h6>
                        <p class="fw-bold fs-4">24</p>
                    </div>
                </div>
            </div>
            <!-- 상태 -->
            <div class="col-sm-6 col-md-3">
                <div class="card h-100">
                    <div class="card-body text-center">
                        <h6 class="text-muted">상태</h6>
                        <span class="badge bg-warning fs-6">발주중</span>
                    </div>
                </div>
            </div>
            <!-- 납품처 -->
            <div class="col-sm-6 col-md-3">
                <div class="card h-100">
                    <div class="card-body text-center">
                        <h6 class="text-muted">납품처</h6>
                        <p class="fw-bold">(주)영성식품</p>
                    </div>
                </div>
            </div>
            <!-- 납품처 담당 -->
            <div class="col-sm-6 col-md-3">
                <div class="card h-100">
                    <div class="card-body text-center">
                        <h6 class="text-muted">납품처 담당</h6>
                        <p class="fw-bold">가연창호</p>
                    </div>
                </div>
            </div>
            <!-- 입고 담당 -->
            <div class="col-sm-6 col-md-3">
                <div class="card h-100">
                    <div class="card-body text-center">
                        <h6 class="text-muted">입고 담당</h6>
                        <p class="fw-bold">이양희</p>
                    </div>
                </div>
            </div>
            <!-- 발주일 -->
            <div class="col-sm-6 col-md-3">
                <div class="card h-100">
                    <div class="card-body text-center">
                        <h6 class="text-muted">발주일</h6>
                        <p class="fw-bold">2025-03-19</p>
                    </div>
                </div>
            </div>
            <!-- 납품처 확인 -->
            <div class="col-sm-6 col-md-3">
                <div class="card h-100">
                    <div class="card-body text-center">
                        <h6 class="text-muted">납품처 확인</h6>
                        <p class="fw-bold">이양희</p>
                    </div>
                </div>
            </div>
            <!-- 입고 완료일 -->
            <div class="col-sm-6 col-md-3">
                <div class="card h-100">
                    <div class="card-body text-center">
                        <h6 class="text-muted">입고 완료일</h6>
                        <p class="fw-bold">-</p>
                    </div>
                </div>
            </div>
        </div>
        <!-- 하부 상세 테이블 -->
        <div class="table-responsive mb-4">
            <table class="table table-bordered">
                <thead class="table-light text-center align-middle">
                    <tr>
                        <th>순번</th>
                        <th>주문번호</th>
                        <th>구분</th>
                        <th>자재명</th>
                        <th>길이</th>
                        <th>중량</th>
                        <th>수량</th>
                        <th>파일</th>
                        <th>발주자</th>
                        <th>발주일</th>
                        <th>확인자</th>
                        <th>확인일</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JavaScript로 동적 생성 -->
                    <tr class="text-center">
                        <td>1</td>
                        <td>24</td>
                        <td>외부</td>
                        <td>단열 AL 자동 프레임</td>
                        <td>1350</td>
                        <td>12.5kg</td>
                        <td>10</td>
                        <td><a href="#" class="btn btn-sm btn-outline-secondary"><i class="bi bi-paperclip"></i></a>
                        </td>
                        <td>홍길동</td>
                        <td>2025-03-19</td>
                        <td>이양희</td>
                        <td>2025-03-20</td>
                        <td><button class="btn btn-sm btn-danger">삭제</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
        <!-- 액션 버튼 -->
        <div class="text-end mt-4">
            <button class="btn btn-secondary me-2"><i class="bi bi-pencil me-1"></i>수정</button>
            <button class="btn btn-primary"><i class="bi bi-check-circle me-1"></i>확인 완료</button>
        </div>
    </div>
    <footer style="text-align: center; padding: 1rem 0; font-size: 0.9rem; color: #6c757d; background-color: #f8f9fa;">
        <a href="https://www.paletto.kr" target="_blank" rel="noopener"
            style="display: inline-flex; align-items: center; text-decoration: none; color: inherit;">
            <span style="margin-right: 0.1em;">Designed by Paletto</span>
            <img src="https://paletto.kr/assets/favicon/favicon.ico" alt="Paletto Logo"
                style="height: 1.5em; width: auto; vertical-align: middle;" />
        </a>
    </footer>
</body>

</html>
