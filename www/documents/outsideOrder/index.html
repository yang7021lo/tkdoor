<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>견적서 인쇄 설정</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .modal-header { background:#f7f7f9; }
    .section-badge { font-size:.75rem; }
    .required-note { color:#6c757d; font-size:.875rem; }
  </style>
</head>
<body class="p-4">

  <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#printSettingsModal">
    인쇄 설정 열기
  </button>

  <div class="modal fade" id="printSettingsModal" tabindex="-1" aria-labelledby="printSettingsLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title" id="printSettingsLabel">인쇄 설정</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="닫기"></button>
        </div>

        <div class="modal-body">
          <div class="mb-3">
            <div class="form-label fw-semibold">출력 영역 선택</div>

            <!-- 필수 영역 -->
            <div class="card mb-3">
              <div class="card-body py-2">
                <div class="d-flex justify-content-between align-items-center">
                  <span class="fw-semibold">필수 영역</span>
                  <span class="badge text-bg-secondary section-badge">항상 포함</span>
                </div>
                <div class="mt-2 d-grid gap-1">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="reqSummary" checked disabled>
                    <label class="form-check-label" for="reqSummary">종합 견적 (필수)</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="reqOption" checked disabled>
                    <label class="form-check-label" for="reqOption">옵션 (필수)</label>
                  </div>
                </div>
                <div class="required-note mt-2">필수 항목은 항상 포함됩니다.</div>
              </div>
            </div>

            <!-- 선택 영역 -->
            <div class="card">
              <div class="card-body py-2">
                <div class="d-flex justify-content-between align-items-center">
                  <span class="fw-semibold">선택 영역</span>
                  <div class="form-check m-0">
                    <input class="form-check-input" type="checkbox" id="optSelectAll">
                    <label class="form-check-label" for="optSelectAll">전체 선택</label>
                  </div>
                </div>

                <div class="mt-2 d-grid gap-1" id="optionalGroup">
                  <div class="form-check">
                    <input class="form-check-input optional" type="checkbox" value="frame" id="optFrame" checked>
                    <label class="form-check-label" for="optFrame">프레임</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input optional" type="checkbox" value="door" id="optDoor" checked>
                    <label class="form-check-label" for="optDoor">도어</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input optional" type="checkbox" value="drawing" id="optDrawing">
                    <label class="form-check-label" for="optDrawing">도면</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input optional" type="checkbox" value="perProduct" id="optPerProduct">
                    <label class="form-check-label" for="optPerProduct">제품별 (프레임+도어+도면)</label>
                  </div>
                </div>
              </div>
            </div>
          </div><!-- /범위 설정 -->
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">취소</button>
          <button type="button" class="btn btn-primary" id="savePrintSettings">인쇄</button>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // 전체 선택
    const group = document.getElementById('optionalGroup');
    const all = document.getElementById('optSelectAll');
    const updateAllCheckbox = () => {
      const opts = [...group.querySelectorAll('.optional')];
      const checked = opts.filter(o => o.checked).length;
      all.indeterminate = checked > 0 && checked < opts.length;
      all.checked = checked === opts.length;
    };
    all.addEventListener('change', () => {
      group.querySelectorAll('.optional').forEach(i => i.checked = all.checked);
      updateAllCheckbox();
    });
    group.querySelectorAll('.optional').forEach(i => i.addEventListener('change', updateAllCheckbox));
    updateAllCheckbox();

    // 제출: form input 으로 전송
    document.getElementById('savePrintSettings').addEventListener('click', () => {
      // 전송 폼 생성
      const form = document.createElement('form');
      form.method = 'POST';
      form.action = '/documents/outsideOrder/preview/'; // 서버 엔드포인트
      form.style.display = 'none';

      // (프레임/도어/도면/제품별) -> 1/0 전송
      const setFlag = (name, checked) => {
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = name;     // 예: frame
        input.value = checked ? '1' : '0';
        form.appendChild(input);
      };
      setFlag('frame', document.getElementById('optFrame').checked);
      setFlag('door', document.getElementById('optDoor').checked);
      setFlag('drawing', document.getElementById('optDrawing').checked);
      setFlag('perProduct', document.getElementById('optPerProduct').checked);

      // 필수 항목 표시 (배열 형태로 예시 전송)
      const addRequired = (val) => {
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = 'required[]';
        input.value = val;     // 'summary', 'option'
        form.appendChild(input);
      };
      addRequired('summary');
      addRequired('option');

      // 필요시 CSRF 토큰 추가 (서버 프레임워크에 맞춰 이름/값 수정)
      // const csrf = document.createElement('input');
      // csrf.type = 'hidden';
      // csrf.name = '__RequestVerificationToken'; // 예: ASP.NET / 또는 'csrfmiddlewaretoken' (Django)
      // csrf.value = '토큰값';
      // form.appendChild(csrf);

      document.body.appendChild(form);
      form.submit();
    });
  </script>
</body>
</html>
