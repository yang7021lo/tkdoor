<!doctype html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>분할 레이아웃 — 마법사 + SVG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="assets/css/index.css" rel="stylesheet" />
</head>

<body>
    <div class="split full">

        <!-- 좌: 마법사 -->
        <section class="panel" id="wizardPane" aria-label="마법사">
            <div class="hd d-flex align-items-center justify-content-between">
                <span>마법사</span>
                <div class="dots d-flex gap-2">
                    <button class="btn btn-outline-light btn-sm" data-goto="0">1</button>
                    <button class="btn btn-outline-light btn-sm" data-goto="1">2</button>
                    <button class="btn btn-outline-light btn-sm" data-goto="2">3</button>
                </div>
            </div>
            <div class="bd">

                <!-- 진행률 -->
                <div class="sheet">
                    <div class="sbd">
                        <div class="d-flex align-items-center justify-content-between">
                            <div class="small muted">단계 <span id="status">1 / 3</span></div>
                            <div class="d-flex gap-2">
                                <button class="btn btn-outline-secondary btn-sm" id="prevBtn">이전</button>
                                <button class="btn btn-primary btn-sm" id="nextBtn">다음</button>
                            </div>
                        </div>
                        <div class="progress mt-2" role="progressbar" aria-label="진행률">
                            <div class="progress-bar" id="prog" style="width:0%"></div>
                        </div>
                    </div>
                </div>

                <!-- STEP 1: 기본 치수(mm) -->
                <div class="sheet step active" data-title="기본 치수(mm)">
                    <div class="shd">기본 정보</div>
                    <div class="sbd">
                        <div class="row g-3">

<div class="row g-3">
  <!-- 종류 -->
  <div class="col-6">
    <label class="form-label">종류</label>
    <input type="text" class="form-control picker" id="typeName" placeholder="선택" readonly
           data-src="/documents/outsideOrder/db/types.json"
           data-label="name" data-value="id"
           data-target-hidden="typeId" data-title="종류 선택">
    <input type="hidden" id="typeId" name="typeId">
  </div>

  <!-- 규격 -->
  <div class="col-6">
    <label class="form-label">규격</label>
    <input type="text" class="form-control picker" id="specName" placeholder="선택" readonly
           data-src="/documents/outsideOrder/db/specs.json"
           data-label="label" data-value="id"
           data-target-hidden="specId" data-title="규격 선택"
           data-autofill="spec"> <!-- w/h 자동 반영 트리거 -->
    <input type="hidden" id="specId" name="specId">
  </div>

  <!-- 재질 -->
  <div class="col-6">
    <label class="form-label">재질</label>
    <input type="text" class="form-control picker" id="materialName" placeholder="선택" readonly
           data-src="/documents/outsideOrder/db/materials.json"
           data-label="name" data-value="id"
           data-target-hidden="materialId" data-title="재질 선택">
    <input type="hidden" id="materialId" name="materialId">
  </div>

  <!-- 도장 -->
  <div class="col-6">
    <label class="form-label">도장</label>
    <input type="text" class="form-control picker" id="coatingName" placeholder="선택" readonly
           data-src="/documents/outsideOrder/db/coatings.json"
           data-label="name" data-value="id"
           data-target-hidden="coatingId" data-title="도장 선택">
    <input type="hidden" id="coatingId" name="coatingId">
  </div>

  <!-- 수량(모달 제외) -->
  <div class="col-6">
    <label class="form-label">수량</label>
    <input type="number" class="form-control" id="qty" value="1" min="1" step="1" inputmode="numeric">
  </div>
                        </div>
                    </div>
                </div>

                <!-- STEP 2: 프레임/유리(mm) -->
                <div class="sheet step" data-title="프레임/유리">
                    <div class="shd">프레임/유리 (mm)</div>
                    <div class="sbd">
                        <div class="row g-3">
                            <div class="col-6">
                                <label class="form-label">프레임 두께</label>
                                <input type="number" class="form-control" id="frameT" value="50" min="20" max="120"
                                    step="5">
                            </div>
                            <div class="col-6">
                                <label class="form-label">유리 여백(좌우)</label>
                                <input type="number" class="form-control" id="glassMX" value="150" min="40" max="400"
                                    step="10">
                            </div>
                            <div class="col-6">
                                <label class="form-label">유리 여백(상하)</label>
                                <input type="number" class="form-control" id="glassMY" value="150" min="40" max="400"
                                    step="10">
                            </div>
                            <div class="col-6">
                                <label class="form-label">스트로크(px)</label>
                                <input type="range" class="form-range" id="strokeW" min="1" max="6" value="2">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- STEP 3: 스타일 -->
                <div class="sheet step" data-title="스타일">
                    <div class="shd">스타일</div>
                    <div class="sbd">
                        <div class="row g-3">
                            <div class="col-6">
                                <label class="form-label">프레임 색</label>
                                <input type="color" id="frameC" class="form-control form-control-color" value="#4b5563">
                            </div>
                            <div class="col-6">
                                <label class="form-label">유리 색</label>
                                <input type="color" id="glassC" class="form-control form-control-color" value="#3a86ff">
                            </div>
                            <div class="col-6">
                                <div class="form-check form-switch mt-2">
                                    <input class="form-check-input" type="checkbox" id="gridOn" checked>
                                    <label class="form-check-label" for="gridOn">그리드 표시</label>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="form-check form-switch mt-2">
                                    <input class="form-check-input" type="checkbox" id="shadowOn" checked>
                                    <label class="form-check-label" for="shadowOn">그림자</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="small muted">※ 모든 입력은 우측 SVG에 즉시 반영됩니다.</div>
            </div>
        </section>

        <!-- 우측: SVG 미리보기 (팬/줌 + 좌측 데이터 반영) -->
        <section class="panel" id="svgPane" aria-label="SVG 미리보기">

            <div class="hd d-flex align-items-center justify-content-between">
                <span>SVG 미리보기</span>
                <div class="d-flex gap-3">
                    <code class="small text-secondary" id="readout">—</code> <!-- 좌측 데이터 리드아웃(그대로 유지) -->
                    <code class="small text-secondary" id="pzReadout">scale=1.00 tx=0 ty=0</code> <!-- 팬/줌 리드아웃 -->
                </div>
            </div>

            <div class="bd">
                <div class="stage">
                    <svg id="canvas" xmlns="http://www.w3.org/2000/svg" aria-label="팬/줌 캔버스">
                        <g id="vp" transform="matrix(1 0 0 1 0 0)">
                            <!-- 패턴/필터 -->
                            <defs>
                                <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
                                    <path d="M24 0H0V24" fill="none" stroke="#2a2a2c" stroke-width="1" />
                                </pattern>
                                <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                                    <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000"
                                        flood-opacity=".45" />
                                </filter>
                            </defs>

                            <!-- 배경 그리드(좌측 옵션으로 토글) -->
                            <rect id="gridRect" x="0" y="0" width="100%" height="100%" fill="url(#grid)" />

                            <!-- 좌측 데이터에 의해 그려지는 도어/프레임/유리 -->
                            <g id="doorGroup" transform="translate(0,0)">
                                <g id="frameRing"></g>
                                <rect id="glassRect" x="0" y="0" width="0" height="0" rx="0" ry="0" fill="#3a86ff"
                                    fill-opacity=".6" stroke="#8aaefc" stroke-width="2" />
                                <circle id="pivot" r="3" fill="#fff" stroke="#111" stroke-width="1" />
                            </g>
                        </g>
                    </svg>
                </div>
                <div class="small muted mt-2">캔버스: viewBox 400×600. 입력(mm)은 자동 스케일링되어 중앙 정렬됩니다.</div>
            </div>
        </section>
    </div>

<!-- Bootstrap JS (이미 로드돼 있으면 생략) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


<!-- 공용 선택 모달 -->
<div class="modal fade" id="pickerModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="pickerTitle">선택</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="닫기"></button>
      </div>
      <div class="modal-body">
        <input id="pickerSearch" class="form-control mb-2" placeholder="검색">
        <div id="pickerList" class="list-group"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
      </div>
    </div>
  </div>
</div>
    


<script>
(() => {
  const modalEl  = document.getElementById("pickerModal");
  const modal    = new bootstrap.Modal(modalEl, { backdrop: "static" });
  const listEl   = document.getElementById("pickerList");
  const titleEl  = document.getElementById("pickerTitle");
  const searchEl = document.getElementById("pickerSearch");

  // URL별 캐시
  const CACHE = new Map();
  let currentPicker = null;

  async function loadArray(url) {
    if (CACHE.has(url)) return CACHE.get(url);
    const res = await fetch(url, { cache: "no-store" });
    if (!res.ok) throw new Error("로드 실패: " + url);
    const data = await res.json();
    // 각 파일이 배열 형태여야 함
    const arr = Array.isArray(data) ? data : (Array.isArray(data.items) ? data.items : []);
    CACHE.set(url, arr);
    return arr;
  }

  function btnFor(item, labelField, valueField) {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "list-group-item list-group-item-action";

    const id    = item?.[valueField] ?? item?.id ?? item?.code ?? "";
    const label = String(item?.[labelField] ?? item?.name ?? item?.label ?? id);

    btn.dataset.id = id;
    btn.dataset.label = label;
    btn.textContent = label;
    btn.addEventListener("click", () => pick(item, label, id));
    return btn;
  }

  function render(items, labelField, valueField) {
    listEl.innerHTML = "";
    if (!items.length) {
      listEl.innerHTML = '<div class="text-secondary small">목록이 없습니다.</div>';
      return;
    }
    items.forEach(it => listEl.appendChild(btnFor(it, labelField, valueField)));
  }

  function filter(items, labelField, term) {
    term = term.trim().toLowerCase();
    if (!term) return items;
    return items.filter(it => String(it?.[labelField] ?? it?.name ?? it?.label ?? "")
      .toLowerCase().includes(term));
  }

  function pick(item, label, id) {
    if (!currentPicker) return;
    const hiddenId = currentPicker.dataset.targetHidden;
    const hidden = document.getElementById(hiddenId);

    currentPicker.value = label;
    if (hidden) hidden.value = id;

    // 규격 선택 시 w/h 자동 반영 (파일이 specs.json일 필요 없음 — 속성 존재 시 반영)
    if (currentPicker.dataset.autofill === "spec" || (("w" in item) && ("h" in item))) {
      const w = document.getElementById("doorW");
      const h = document.getElementById("doorH");
      if (w && typeof item.w === "number") w.value = item.w;
      if (h && typeof item.h === "number") h.value = item.h;
    }
    modal.hide();
  }

  async function openPickerFor(input) {
    currentPicker = input;
    titleEl.textContent = input.dataset.title || "선택";
    searchEl.value = "";

    const url = input.dataset.src;
    const labelField = input.dataset.label || "name";
    const valueField = input.dataset.value || "id";

    try {
      const items = await loadArray(url);
      render(items, labelField, valueField);
      searchEl.oninput = () => render(filter(items, labelField, searchEl.value), labelField, valueField);
      modal.show();
    } catch (e) {
      console.error(e);
      listEl.innerHTML = '<div class="text-danger small">옵션 로드 실패</div>';
      modal.show();
    }
  }

  document.querySelectorAll(".picker").forEach(input => {
    input.style.cursor = "pointer";
    input.addEventListener("click", () => openPickerFor(input));
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        openPickerFor(input);
      }
    });
  });

  modalEl.addEventListener("shown.bs.modal", () => searchEl.focus());
})();
</script>

    <script src="assets/js/zoom.js"></script>

</body>

</html>
