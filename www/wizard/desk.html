<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>분할 레이아웃 — 마법사 + SVG</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    :root { --ink:#e9e9ea; --bg:#0f0f10; --panel:#17181a; --line:#2a2a2c; }

    /* 1) 페이지 전체를 정확히 100vh로 만들고, 바깥 스크롤을 완전히 차단 */
    html, body { height:100%; margin:0; }
    body {
      color:var(--ink);
      background:var(--bg);
      overflow:hidden;                /* 바깥 스크롤 차단 */
      overscroll-behavior:none;       /* iOS/안드 바운스 방지 */
    }

    /* 2) 루트 래퍼는 정확히 viewport 높이 고정 */
    .full { height:100dvh; }          /* 신형 단위: 주소창 변동에 강함 */
    @supports not (height: 100dvh) { .full { height:100vh; } } /* 폴백 */

    /* 2분할 그리드 */
    .split { display:grid; grid-template-columns: 1fr; }
    @media (min-width: 1200px) { .split { grid-template-columns: 1fr 1fr; } }

    /* 패널은 내부만 스크롤(필요 시), 바깥은 고정 */
    .panel {
      display:flex; flex-direction:column;
      height:100%;                     /* 부모(.full)의 100% 채움 */
      border-left:1px solid var(--line);
      border-right:1px solid var(--line);
      overflow:hidden;                 /* 패널 바깥 넘침 차단 */
    }
    .panel .hd {
      flex:0 0 auto;
      position:sticky; top:0; z-index:2;
      background:linear-gradient(#191a1d, #17181a);
      padding:12px 16px; border-bottom:1px solid var(--line);
      font-weight:700; letter-spacing:.2px;
    }
    .panel .bd {
      flex:1 1 auto;
      overflow:auto;                   /* 내용이 많으면 '패널 내부'에서만 스크롤 */
      -webkit-overflow-scrolling:touch;
      padding:16px; gap:12px; display:flex; flex-direction:column;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
    }

    /* 카드형 섹션 */
    .sheet { background:#111214; border:1px solid var(--line); border-radius:14px; }
    .sheet .shd { padding:12px 14px; border-bottom:1px solid var(--line); font-weight:600; }
    .sheet .sbd { padding:14px; }

    /* 폼 가독성 */
    .form-label { color:#cfd1d4; font-weight:600; }
    .form-control, .form-select { background:#0e0f11; color:#e9e9ea; border-color:#2a2a2c; }
    .form-control:focus, .form-select:focus { box-shadow:none; border-color:#3a86ff; }
    .form-range::-webkit-slider-thumb { background:#0d6efd; }
    .form-check-input { background:#0e0f11; border-color:#2a2a2c; }
    .form-check-input:checked { background-color:#0d6efd; border-color:#0d6efd; }

    /* 마법사 단계 */
    .step { display:none; }
    .step.active { display:block; }
    .dots .btn { width:2.25rem; height:2.25rem; border-radius:999px; padding:0; }

    /* SVG 영역(우측 패널에서 높이 100%로 채움) */
    .stage {
      background: conic-gradient(from 90deg at 0 0, #141416, #141416) padding-box,
                  repeating-linear-gradient(0deg, #1e1f22, #1e1f22 24px, #1a1b1d 24px, #1a1b1d 48px) border-box;
      border:1px solid var(--line); border-radius:16px; padding:8px;
      flex:1 1 auto; display:flex;    /* 높이 100% 채우기 */
    }
    svg { display:block; width:100%; height:100%; } /* 좌우/상하 100% */

    .muted { color:#a1a6ad !important; }
  </style>
</head>

<body>
  <div class="split full">

    <!-- 좌: 마법사 -->
    <section class="panel" id="wizardPane" aria-label="마법사">
      <div class="hd d-flex align-items-center justify-content-between">
        <span>마법사</span>
        <div class="dots d-flex gap-2">
          <button class="btn btn-outline-light btn-sm" data-goto="0">1</button>
          <button class="btn btn-outline-light btn-sm" data-goto="1">2</button>
          <button class="btn btn-outline-light btn-sm" data-goto="2">3</button>
        </div>
      </div>
      <div class="bd">

        <!-- 진행률 -->
        <div class="sheet">
          <div class="sbd">
            <div class="d-flex align-items-center justify-content-between">
              <div class="small muted">단계 <span id="status">1 / 3</span></div>
              <div class="d-flex gap-2">
                <button class="btn btn-outline-secondary btn-sm" id="prevBtn">이전</button>
                <button class="btn btn-primary btn-sm" id="nextBtn">다음</button>
              </div>
            </div>
            <div class="progress mt-2" role="progressbar" aria-label="진행률">
              <div class="progress-bar" id="prog" style="width:0%"></div>
            </div>
          </div>
        </div>

        <!-- STEP 1: 기본 치수(mm) -->
        <div class="sheet step active" data-title="기본 치수(mm)">
          <div class="shd">기본 치수 (mm)</div>
          <div class="sbd">
            <div class="row g-3">
              <div class="col-6">
                <label class="form-label">문 가로(폭)</label>
                <input type="number" class="form-control" id="doorW" value="900" min="400" max="1600" step="10" inputmode="numeric">
              </div>
              <div class="col-6">
                <label class="form-label">문 세로(높이)</label>
                <input type="number" class="form-control" id="doorH" value="2100" min="1500" max="3000" step="10" inputmode="numeric">
              </div>
              <div class="col-6">
                <label class="form-label">모서리 반경 r</label>
                <input type="number" class="form-control" id="cornerR" value="8" min="0" max="60" step="1" inputmode="numeric">
              </div>
              <div class="col-6">
                <label class="form-label">회전(°)</label>
                <input type="range" class="form-range" id="rot" min="-30" max="30" value="0">
              </div>
            </div>
          </div>
        </div>

        <!-- STEP 2: 프레임/유리(mm) -->
        <div class="sheet step" data-title="프레임/유리">
          <div class="shd">프레임/유리 (mm)</div>
          <div class="sbd">
            <div class="row g-3">
              <div class="col-6">
                <label class="form-label">프레임 두께</label>
                <input type="number" class="form-control" id="frameT" value="50" min="20" max="120" step="5">
              </div>
              <div class="col-6">
                <label class="form-label">유리 여백(좌우)</label>
                <input type="number" class="form-control" id="glassMX" value="150" min="40" max="400" step="10">
              </div>
              <div class="col-6">
                <label class="form-label">유리 여백(상하)</label>
                <input type="number" class="form-control" id="glassMY" value="150" min="40" max="400" step="10">
              </div>
              <div class="col-6">
                <label class="form-label">스트로크(px)</label>
                <input type="range" class="form-range" id="strokeW" min="1" max="6" value="2">
              </div>
            </div>
          </div>
        </div>

        <!-- STEP 3: 스타일 -->
        <div class="sheet step" data-title="스타일">
          <div class="shd">스타일</div>
          <div class="sbd">
            <div class="row g-3">
              <div class="col-6">
                <label class="form-label">프레임 색</label>
                <input type="color" id="frameC" class="form-control form-control-color" value="#4b5563">
              </div>
              <div class="col-6">
                <label class="form-label">유리 색</label>
                <input type="color" id="glassC" class="form-control form-control-color" value="#3a86ff">
              </div>
              <div class="col-6">
                <div class="form-check form-switch mt-2">
                  <input class="form-check-input" type="checkbox" id="gridOn" checked>
                  <label class="form-check-label" for="gridOn">그리드 표시</label>
                </div>
              </div>
              <div class="col-6">
                <div class="form-check form-switch mt-2">
                  <input class="form-check-input" type="checkbox" id="shadowOn" checked>
                  <label class="form-check-label" for="shadowOn">그림자</label>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="small muted">※ 모든 입력은 우측 SVG에 즉시 반영됩니다.</div>
      </div>
    </section>

    <!-- 우측: SVG 미리보기 (팬/줌 + 좌측 데이터 반영) -->
    <section class="panel" id="svgPane" aria-label="SVG 미리보기">
      <style>
        #svgPane .bd { padding:12px; display:flex; flex-direction:column; }
        #svgPane .stage { flex:1 1 auto; display:flex; border:1px solid #2a2a2c; border-radius:16px; background:#111214; }
        #svgPane svg { width:100%; height:100%; display:block; touch-action:none; } /* 제스처 직접 처리 */
      </style>

      <div class="hd d-flex align-items-center justify-content-between">
        <span>SVG 미리보기</span>
        <div class="d-flex gap-3">
          <code class="small text-secondary" id="readout">—</code>           <!-- 좌측 데이터 리드아웃(그대로 유지) -->
          <code class="small text-secondary" id="pzReadout">scale=1.00 tx=0 ty=0</code> <!-- 팬/줌 리드아웃 -->
        </div>
      </div>

      <div class="bd">
        <div class="stage">
          <svg id="canvas" xmlns="http://www.w3.org/2000/svg" aria-label="팬/줌 캔버스">
            <g id="vp" transform="matrix(1 0 0 1 0 0)">
              <!-- 패턴/필터 -->
              <defs>
                <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
                  <path d="M24 0H0V24" fill="none" stroke="#2a2a2c" stroke-width="1"/>
                </pattern>
                <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                  <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity=".45"/>
                </filter>
              </defs>

              <!-- 배경 그리드(좌측 옵션으로 토글) -->
              <rect id="gridRect" x="0" y="0" width="100%" height="100%" fill="url(#grid)"/>

              <!-- 좌측 데이터에 의해 그려지는 도어/프레임/유리 -->
              <g id="doorGroup" transform="translate(0,0)">
                <g id="frameRing"></g>
                <rect id="glassRect" x="0" y="0" width="0" height="0" rx="0" ry="0"
                      fill="#3a86ff" fill-opacity=".6" stroke="#8aaefc" stroke-width="2"/>
                <circle id="pivot" r="3" fill="#fff" stroke="#111" stroke-width="1" />
              </g>
            </g>
          </svg>
        </div>
        <div class="small muted mt-2">캔버스: viewBox 400×600. 입력(mm)은 자동 스케일링되어 중앙 정렬됩니다.</div>
      </div>

      <!-- 팬/줌 전용 스크립트 -->
      <script>
        (function(){
          const svg = document.getElementById('canvas');
          const vp  = document.getElementById('vp');
          const pzReadout = document.getElementById('pzReadout');

          let k = 1, tx = 0, ty = 0;                 // scale, translate (SVG user unit)
          const kMin = 0.2, kMax = 10;
          const WHEEL_STEP = 1.1;

          function applyTransform() {
            vp.setAttribute('transform', `matrix(${k} 0 0 ${k} ${tx} ${ty})`);
            if (pzReadout) pzReadout.textContent = `scale=${k.toFixed(2)} tx=${tx.toFixed(1)} ty=${ty.toFixed(1)}`;
          }

          function clientToLocal(e, target = vp) {
            const pt = svg.createSVGPoint();
            pt.x = (e.clientX !== undefined) ? e.clientX : e.touches[0].clientX;
            pt.y = (e.clientY !== undefined) ? e.clientY : e.touches[0].clientY;
            const m = target.getScreenCTM().inverse();
            return pt.matrixTransform(m);
          }

          function zoomAt(cx, cy, factor) {
            const newK = Math.max(kMin, Math.min(kMax, k * factor));
            if (newK === k) return;
            tx = tx + (k - newK) * cx;
            ty = ty + (k - newK) * cy;
            k = newK;
            applyTransform();
          }

          // 마우스 휠 줌
          svg.addEventListener('wheel', (e) => {
            e.preventDefault();
            const p = clientToLocal(e, vp);
            const f = (e.deltaY < 0) ? WHEEL_STEP : (1 / WHEEL_STEP);
            zoomAt(p.x, p.y, f);
          }, { passive:false });

          // 드래그 팬
          let isPanning = false;
          let last = null;

          svg.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            isPanning = true;
            last = { x: e.clientX, y: e.clientY };
            svg.setPointerCapture(e.pointerId);
          });
          svg.addEventListener('pointermove', (e) => {
            if (!isPanning) return;
            const dxPx = e.clientX - last.x;
            const dyPx = e.clientY - last.y;
            last = { x: e.clientX, y: e.clientY };
            const ctm = svg.getScreenCTM();
            tx += dxPx / ctm.a;
            ty += dyPx / ctm.d;
            applyTransform();
          });
          const endPan = (e)=>{ if(isPanning){ isPanning=false; try{svg.releasePointerCapture(e.pointerId);}catch(_){} } };
          svg.addEventListener('pointerup', endPan);
          svg.addEventListener('pointercancel', endPan);
          svg.addEventListener('pointerleave', endPan);

          // 터치 핀치 줌 + 팬
          let touches = new Map(); // id -> {clientX,clientY}
          let pinch = null;        // {k0, tx0, ty0, p:{x,y}, d0}

          svg.addEventListener('touchstart', (e) => {
            for (const t of e.changedTouches) touches.set(t.identifier, {x:t.clientX, y:t.clientY});
            if (touches.size === 2) {
              const [a,b] = [...touches.values()];
              const d0 = Math.hypot(b.x - a.x, b.y - a.y);
              const midClient = { x:(a.x+b.x)/2, y:(a.y+b.y)/2 };
              const pt = svg.createSVGPoint(); pt.x = midClient.x; pt.y = midClient.y;
              const p = pt.matrixTransform(vp.getScreenCTM().inverse());
              pinch = { k0:k, tx0:tx, ty0:ty, p, d0 };
            }
          }, {passive:true});

          svg.addEventListener('touchmove', (e) => {
            if (touches.size === 2 && pinch) {
              e.preventDefault();
              for (const t of e.changedTouches) touches.set(t.identifier, {x:t.clientX, y:t.clientY});
              const [a,b] = [...touches.values()];
              const d = Math.hypot(b.x - a.x, b.y - a.y);
              const f = (d / pinch.d0) || 1;
              let newK = Math.max(kMin, Math.min(kMax, pinch.k0 * f));
              tx = pinch.tx0 + (pinch.k0 - newK) * pinch.p.x;
              ty = pinch.ty0 + (pinch.k0 - newK) * pinch.p.y;
              k = newK;
              applyTransform();
            } else if (touches.size === 1 && !pinch) {
              e.preventDefault();
              const t = e.changedTouches[0];
              if (!last) last = {x:t.clientX, y:t.clientY};
              const dxPx = t.clientX - last.x;
              const dyPx = t.clientY - last.y;
              last = {x:t.clientX, y:t.clientY};
              const ctm = svg.getScreenCTM();
              tx += dxPx / ctm.a;
              ty += dyPx / ctm.d;
              applyTransform();
            }
          }, {passive:false});

          svg.addEventListener('touchend', (e) => {
            for (const t of e.changedTouches) touches.delete(t.identifier);
            if (touches.size < 2) pinch = null;
            if (touches.size === 0) last = null;
          });
          svg.addEventListener('touchcancel', (e) => {
            touches.clear(); pinch = null; last = null;
          });

          applyTransform();
        })();
      </script>
    </section>

  </div>

  <!-- 좌측(마법사) → 우측(SVG) 연동 스크립트 -->
  <script>
    (function () {
      // ---------- 유틸 ----------
      const $ = s => document.querySelector(s);
      const $$ = s => Array.from(document.querySelectorAll(s));
      const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

      // ---------- 마법사(단계) ----------
      const steps = $$('.step');
      const status = $('#status');
      const prog = $('#prog');
      let si = 0;

      function renderStep() {
        steps.forEach((el, idx) => el.classList.toggle('active', idx === si));
        status.textContent = `${si + 1} / ${steps.length}`;
        const pct = steps.length > 1 ? (si / (steps.length - 1)) * 100 : 100;
        prog.style.width = pct + '%';
        // 상단 점 버튼 상태
        $$('#wizardPane .dots .btn').forEach((b, idx) => {
          b.classList.toggle('btn-light', idx === si);
          b.classList.toggle('btn-outline-light', idx !== si);
        });
      }
      $('#prevBtn').addEventListener('click', () => { si = clamp(si - 1, 0, steps.length - 1); renderStep(); });
      $('#nextBtn').addEventListener('click', () => { si = clamp(si + 1, 0, steps.length - 1); renderStep(); });
      $$('#wizardPane [data-goto]').forEach(b => {
        b.addEventListener('click', () => { si = +b.dataset.goto | 0; renderStep(); });
      });

      // ---------- 요소 참조 ----------
      const doorW = $('#doorW'), doorH = $('#doorH'), cornerR = $('#cornerR'), rot = $('#rot');
      const frameT = $('#frameT'), glassMX = $('#glassMX'), glassMY = $('#glassMY'), strokeW = $('#strokeW');
      const frameC = $('#frameC'), glassC = $('#glassC'), gridOn = $('#gridOn'), shadowOn = $('#shadowOn');

      const svg = $('svg');                 // 우측 SVG
      const doorGroup = $('#doorGroup');
      const frameRing = $('#frameRing');
      const glassRect = $('#glassRect');
      const pivot = $('#pivot');
      const gridRect = $('#gridRect');
      const readout = $('#readout');        // 좌측 데이터 리드아웃(우측 헤더에 표시)

      // ---------- 렌더링 ----------
      function update() {
        // 입력값(mm)
        const DW = +doorW.value || 900;
        const DH = +doorH.value || 2100;
        const FT = +frameT.value || 50;
        const GMX = +glassMX.value || 150;
        const GMY = +glassMY.value || 150;
        const R   = +cornerR.value || 8;
        const DEG = +rot.value || 0;

        // 캔버스(viewBox)
        const VBW = 400, VBH = 600, M = 20; // margin
        const scale = Math.min((VBW - M * 2) / DW, (VBH - M * 2) / DH); // mm -> viewBox
        const w = DW * scale, h = DH * scale;

        // 그룹 위치/회전(중심 기준)
        const cx = M + w / 2, cy = M + h / 2;
        doorGroup.setAttribute('transform', `translate(0,0) rotate(${DEG} ${cx} ${cy})`);

        // 프레임(링) 그리기: 외곽/내곽 두 사각형으로 링 구현
        const rx = R * scale, ry = rx;
        const outer = { x: M, y: M, w, h, r: rx };
        const inner = { x: M + FT * scale, y: M + FT * scale, w: w - 2 * FT * scale, h: h - 2 * FT * scale, r: Math.max(0, rx - FT * scale) };

        frameRing.innerHTML = `
          <path d="
            M ${outer.x} ${outer.y}
            h ${outer.w} v ${outer.h} h ${-outer.w} Z
            M ${inner.x} ${inner.y}
            h ${inner.w} v ${inner.h} h ${-inner.w} Z
          " fill="${frameC.value}" fill-rule="evenodd"
            ${shadowOn.checked ? 'filter="url(#shadow)"' : ''} />
          <rect x="${outer.x}" y="${outer.y}" width="${outer.w}" height="${outer.h}"
                rx="${rx}" ry="${ry}" fill="none"
                stroke="${frameC.value}" stroke-width="${+strokeW.value}" />
        `;

        // 유리(프레임 안쪽 여백 적용)
        const gx = inner.x + GMX * scale;
        const gy = inner.y + GMY * scale;
        const gw = Math.max(0, inner.w - 2 * GMX * scale);
        const gh = Math.max(0, inner.h - 2 * GMY * scale);
        const gr = Math.max(0, Math.min(rx, R * scale - FT * scale - Math.max(GMX, GMY) * scale));

        glassRect.setAttribute('x', gx);
        glassRect.setAttribute('y', gy);
        glassRect.setAttribute('width', gw);
        glassRect.setAttribute('height', gh);
        glassRect.setAttribute('rx', gr);
        glassRect.setAttribute('ry', gr);
        glassRect.setAttribute('fill', glassC.value);
        glassRect.setAttribute('stroke-width', +strokeW.value);
        glassRect.setAttribute('filter', shadowOn.checked ? 'url(#shadow)' : '');

        // 피벗(캔버스 좌표)
        pivot.setAttribute('cx', cx);
        pivot.setAttribute('cy', cy);

        // 옵션
        gridRect.setAttribute('opacity', gridOn.checked ? '1' : '0');

        // 리드아웃(좌측 데이터 상태)
        readout.textContent = `door=${DW}×${DH}mm, frame=${FT}mm, glassMargin=${GMX}/${GMY}mm, r=${R}, rot=${DEG}°, scale=${scale.toFixed(3)}`;
      }

      // 이벤트 바인딩
      const inputs = [doorW, doorH, cornerR, rot, frameT, glassMX, glassMY, strokeW, frameC, glassC, gridOn, shadowOn];
      inputs.forEach(el => {
        ['input', 'change'].forEach(ev => el.addEventListener(ev, update, { passive: true }));
      });

      // 초기 렌더
      renderStep();
      update();
    })();
  </script>
</body>
</html>
