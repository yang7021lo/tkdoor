<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>임광현 첫 코딩</title>
</head>
<body>
<!-- 부모창에 추가할 코드 예시 -->
<!-- Bootstrap 5 CSS & JS CDN 필요 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- 트리거 버튼 -->
<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#alignModal">
  맞춤 옵션 선택
</button>

<!-- 모달 구조 -->
<div class="modal fade" id="alignModal" tabindex="-1" aria-labelledby="alignModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="alignModalLabel">맞춤 옵션 선택</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="닫기"></button>
      </div>
      <div class="modal-body text-center">
        <div class="d-flex justify-content-center gap-2 mb-3">
          <button type="button" class="btn btn-primary" onclick="alignParent('h')">가로맞춤</button>
          <button type="button" class="btn btn-success" onclick="alignParent('v')">세로맞춤</button>
          <button type="button" class="btn btn-warning" onclick="alignParent('b')">둘다맞춤</button>
        </div>
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">창닫기</button>
      </div>
    </div>
  </div>
</div>

<script>
function alignParent(type) {
  // type: 'h', 'v', 'b'
  // 아래 location.href 부분을 원하는 URL로 변경하세요.
  if (type === 'h') {
    location.href = 'parent_url_horizon.asp';
  } else if (type === 'v') {
    location.href = 'parent_url_vertical.asp';
  } else if (type === 'b') {
    location.href = 'parent_url_both.asp';
  }
  // 모달 닫기 (필요시)
  var modal = bootstrap.Modal.getInstance(document.getElementById('alignModal'));
  modal.hide();
}
</script>
</body>
</html>
