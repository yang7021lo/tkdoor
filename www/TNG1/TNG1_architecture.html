<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Malgun Gothic', 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; overflow: hidden; }

#toolbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: #161b22; border-bottom: 1px solid #30363d;
  padding: 8px 16px; display: flex; align-items: center; gap: 12px;
}
#toolbar h1 { font-size: 15px; color: #58a6ff; white-space: nowrap; }
#toolbar .sep { width: 1px; height: 24px; background: #30363d; }
#toolbar button {
  background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
  padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
}
#toolbar button:hover { background: #30363d; }
#toolbar button.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
.legend { display: flex; gap: 12px; margin-left: auto; font-size: 11px; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }

#canvas { position: absolute; top: 45px; left: 0; right: 0; bottom: 0; }
svg { width: 100%; height: 100%; }

#detail-panel {
  position: fixed; right: -400px; top: 45px; bottom: 0; width: 400px;
  background: #161b22; border-left: 1px solid #30363d;
  transition: right 0.3s; z-index: 50; overflow-y: auto; padding: 16px;
}
#detail-panel.open { right: 0; }
#detail-panel h2 { color: #58a6ff; font-size: 16px; margin-bottom: 12px; }
#detail-panel .close-btn {
  position: absolute; top: 8px; right: 12px; background: none;
  border: none; color: #8b949e; font-size: 20px; cursor: pointer;
}
#detail-panel h3 { color: #f0883e; font-size: 13px; margin: 12px 0 4px; }
#detail-panel ul { padding-left: 16px; font-size: 12px; line-height: 1.8; }
#detail-panel li { color: #8b949e; }
#detail-panel .tag {
  display: inline-block; background: #1f6feb22; color: #58a6ff;
  padding: 1px 6px; border-radius: 3px; font-size: 11px; margin: 1px;
}
#detail-panel .tag-db {
  background: #f0883e22; color: #f0883e;
}

#minimap {
  position: fixed; bottom: 12px; left: 12px; width: 200px; height: 140px;
  background: #161b22; border: 1px solid #30363d; border-radius: 6px;
  z-index: 50; overflow: hidden;
}
#minimap svg { width: 100%; height: 100%; }
#minimap .viewport { fill: #58a6ff; opacity: 0.15; stroke: #58a6ff; stroke-width: 1; }

.node-group { cursor: pointer; }
.node-group:hover .node-rect { filter: brightness(1.3); }
.node-rect { rx: 8; ry: 8; stroke-width: 1.5; }
.node-label { font-size: 11px; fill: #fff; text-anchor: middle; pointer-events: none; font-weight: 600; }
.node-sublabel { font-size: 9px; fill: #8b949e; text-anchor: middle; pointer-events: none; }
.edge { fill: none; stroke-width: 1.2; opacity: 0.5; }
.edge:hover { opacity: 1; stroke-width: 2.5; }
.edge-label { font-size: 8px; fill: #484f58; }
marker path { stroke: none; }

.tooltip {
  position: fixed; background: #1c2128; border: 1px solid #30363d;
  padding: 6px 10px; border-radius: 6px; font-size: 11px;
  pointer-events: none; z-index: 200; display: none; max-width: 280px;
}

  { from: 'TNG1_B', to: 'installManual', label: 'popup:도면보기', type: 'popup', group: 'data' },

  { from: 'TNG1_B', to: 'unitprice_t', label: 'link:단가관리', type: 'link', group: 'price' },

// ===== COLORS =====
const typeColors = {
  main: { fill: '#1f6feb', stroke: '#58a6ff' },
  db: { fill: '#238636', stroke: '#3fb950' },
  popup: { fill: '#9e6a03', stroke: '#f0883e' },
  external: { fill: '#8957e5', stroke: '#bc8cff' },
  print: { fill: '#da3633', stroke: '#f85149' },
};

const edgeColors = {
  form: '#3fb950',
  redirect: '#f0883e',
  popup: '#bc8cff',
  link: '#58a6ff',
  iframe: '#f85149',
  fetch: '#e3b341',
};

// ===== SVG SETUP =====
let currentFilter = 'all';
let transform = { x: 0, y: 0, k: 1 };
let dragging = null;
let dragOffset = { x: 0, y: 0 };
let panning = false;
let panStart = { x: 0, y: 0 };

const canvas = document.getElementById('canvas');
const NS = 'http://www.w3.org/2000/svg';

function createSVG() {
  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('id', 'main-svg');
  const defs = document.createElementNS(NS, 'defs');

  // Arrow markers
  Object.entries(edgeColors).forEach(([type, color]) => {
    const marker = document.createElementNS(NS, 'marker');
    marker.setAttribute('id', `arrow-${type}`);
    marker.setAttribute('viewBox', '0 0 10 6');
    marker.setAttribute('refX', '10');
    marker.setAttribute('refY', '3');
    marker.setAttribute('markerWidth', '10');
    marker.setAttribute('markerHeight', '6');
    marker.setAttribute('orient', 'auto');
    const path = document.createElementNS(NS, 'path');
    path.setAttribute('d', 'M0,0 L10,3 L0,6 Z');
    path.setAttribute('fill', color);
    marker.appendChild(path);
    defs.appendChild(marker);
  });

  svg.appendChild(defs);

  const g = document.createElementNS(NS, 'g');
  g.setAttribute('id', 'main-group');
  svg.appendChild(g);
  canvas.appendChild(svg);

  // Pan & Zoom
  svg.addEventListener('mousedown', (e) => {
    if (e.target === svg || e.target.closest('#main-group') && !e.target.closest('.node-group')) {
      panning = true;
      panStart = { x: e.clientX - transform.x, y: e.clientY - transform.y };
    }
  });
  svg.addEventListener('mousemove', (e) => {
    if (panning) {
      transform.x = e.clientX - panStart.x;
      transform.y = e.clientY - panStart.y;
      applyTransform();
    }
    if (dragging) {
      const node = nodes.find(n => n.id === dragging);
      node.x = (e.clientX - transform.x - dragOffset.x) / transform.k;
      node.y = (e.clientY - 45 - transform.y - dragOffset.y) / transform.k;
      render();
    }
  });
  svg.addEventListener('mouseup', () => { panning = false; dragging = null; });
  svg.addEventListener('mouseleave', () => { panning = false; dragging = null; });
  svg.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = svg.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    const newK = Math.max(0.2, Math.min(3, transform.k * delta));
    transform.x = mx - (mx - transform.x) * (newK / transform.k);
    transform.y = my - (my - transform.y) * (newK / transform.k);
    transform.k = newK;
    applyTransform();
  }, { passive: false });
}

function applyTransform() {
  const g = document.getElementById('main-group');
  g.setAttribute('transform', `translate(${transform.x},${transform.y}) scale(${transform.k})`);
}

function render() {
  const g = document.getElementById('main-group');
  g.innerHTML = '';

  const visibleNodes = currentFilter === 'all' ? nodes : nodes.filter(n => n.group === currentFilter || n.id === 'TNG1_B');
  const visibleIds = new Set(visibleNodes.map(n => n.id));
  const visibleEdges = edges.filter(e => visibleIds.has(e.from) && visibleIds.has(e.to));

  // Draw edges first
  visibleEdges.forEach(e => {
    const fromNode = nodes.find(n => n.id === e.from);
    const toNode = nodes.find(n => n.id === e.to);
    if (!fromNode || !toNode) return;

    const nw = e.from === 'TNG1_B' ? 80 : 70;
    const dx = toNode.x - fromNode.x;
    const dy = toNode.y - fromNode.y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;

    const sx = fromNode.x + (dx/dist) * nw;
    const sy = fromNode.y + (dy/dist) * 18;
    const ex = toNode.x - (dx/dist) * 70;
    const ey = toNode.y - (dy/dist) * 18;

    const cx1 = sx + (ex - sx) * 0.3 + (sy - ey) * 0.15;
    const cy1 = sy + (ey - sy) * 0.3 - (sx - ex) * 0.15;
    const cx2 = sx + (ex - sx) * 0.7 + (sy - ey) * 0.15;
    const cy2 = sy + (ey - sy) * 0.7 - (sx - ex) * 0.15;

    const path = document.createElementNS(NS, 'path');
    path.setAttribute('d', `M${sx},${sy} C${cx1},${cy1} ${cx2},${cy2} ${ex},${ey}`);
    path.setAttribute('class', 'edge');
    path.setAttribute('stroke', edgeColors[e.type] || '#484f58');
    path.setAttribute('marker-end', `url(#arrow-${e.type})`);

    const title = document.createElementNS(NS, 'title');
    title.textContent = `${e.from} → ${e.to}\n${e.label}`;
    path.appendChild(title);
    g.appendChild(path);

    // Edge label
    const midX = (sx + ex) / 2 + (sy - ey) * 0.08;
    const midY = (sy + ey) / 2 - (sx - ex) * 0.08;
    const text = document.createElementNS(NS, 'text');
    text.setAttribute('x', midX);
    text.setAttribute('y', midY);
    text.setAttribute('class', 'edge-label');
    text.textContent = e.label;
    g.appendChild(text);
  });

  // Draw nodes
  visibleNodes.forEach(n => {
    const group = document.createElementNS(NS, 'g');
    group.setAttribute('class', 'node-group');
    group.setAttribute('transform', `translate(${n.x},${n.y})`);
    group.setAttribute('data-id', n.id);

    const isMain = n.id === 'TNG1_B';
    const w = isMain ? 170 : 150;
    const h = isMain ? 44 : 38;
    const colors = typeColors[n.type] || typeColors.popup;

    const rect = document.createElementNS(NS, 'rect');
    rect.setAttribute('x', -w/2);
    rect.setAttribute('y', -h/2);
    rect.setAttribute('width', w);
    rect.setAttribute('height', h);
    rect.setAttribute('fill', colors.fill);
    rect.setAttribute('stroke', colors.stroke);
    rect.setAttribute('class', 'node-rect');
    if (isMain) { rect.setAttribute('stroke-width', '3'); rect.setAttribute('filter', 'drop-shadow(0 0 8px rgba(88,166,255,0.5))'); }
    group.appendChild(rect);

    const label = document.createElementNS(NS, 'text');
    label.setAttribute('y', -3);
    label.setAttribute('class', 'node-label');
    label.textContent = n.label;
    group.appendChild(label);

    const sub = document.createElementNS(NS, 'text');
    sub.setAttribute('y', 12);
    sub.setAttribute('class', 'node-sublabel');
    sub.textContent = n.sub;
    group.appendChild(sub);

    // Events
    group.addEventListener('mousedown', (e) => {
      e.stopPropagation();
      dragging = n.id;
      dragOffset = {
        x: e.clientX - transform.x - n.x * transform.k,
        y: e.clientY - 45 - transform.y - n.y * transform.k
      };
    });
    group.addEventListener('click', (e) => {
      if (Math.abs(e.clientX - (transform.x + n.x * transform.k + dragOffset.x)) < 5) {
        showDetail(n);
      }
    });
    group.addEventListener('dblclick', () => showDetail(n));

    g.appendChild(group);
  });
}

// ===== DETAIL PANEL =====
function showDetail(node) {
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');
  let html = `<h2>${node.label}</h2><p style="color:#8b949e;font-size:13px;margin-bottom:8px">${node.sub}</p>`;

  if (node.detail) {
    if (node.detail.desc) html += `<p style="font-size:12px;line-height:1.6;margin-bottom:8px">${node.detail.desc}</p>`;
    if (node.detail.params) {
      html += '<h3>파라미터</h3><div>';
      node.detail.params.forEach(p => html += `<span class="tag">${p}</span> `);
      html += '</div>';
    }
    if (node.detail.tables) {
      html += '<h3>DB 테이블</h3><div>';
      node.detail.tables.forEach(t => html += `<span class="tag tag-db">${t}</span> `);
      html += '</div>';
    }
    if (node.detail.forms) {
      html += '<h3>폼 전송</h3><ul>';
      node.detail.forms.forEach(f => html += `<li>${f}</li>`);
      html += '</ul>';
    }
  }

  // Connected edges
  const incoming = edges.filter(e => e.to === node.id);
  const outgoing = edges.filter(e => e.from === node.id);
  if (incoming.length) {
    html += '<h3>들어오는 연결</h3><ul>';
    incoming.forEach(e => html += `<li><span style="color:${edgeColors[e.type]}">${e.label}</span> ← ${e.from}</li>`);
    html += '</ul>';
  }
  if (outgoing.length) {
    html += '<h3>나가는 연결</h3><ul>';
    outgoing.forEach(e => html += `<li><span style="color:${edgeColors[e.type]}">${e.label}</span> → ${e.to}</li>`);
    html += '</ul>';
  }

  content.innerHTML = html;
  panel.classList.add('open');
}

function closePanel() {
  document.getElementById('detail-panel').classList.remove('open');
}

// ===== FILTER =====
function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('#toolbar button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function resetView() {
  transform = { x: 200, y: 100, k: 1.1 };
  applyTransform();
}

// ===== INIT =====
createSVG();
resetView();
render();
</script>
